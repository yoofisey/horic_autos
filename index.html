<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horic Autos | Drive Beyond</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="nav-logo">
    <img src="horic.png" alt="Horic Autos Logo">
  </div>    
  <div class="nav-links">
    <a href="inventory.html">Inventory</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section class="hero">
  <h1>DRIVE BEYOND <span>EXPECTATIONS</span></h1>
  <p>Curated selection of high-performance vehicles for the modern driver.</p>
  <a href="inventory.html" class="btn-primary">Explore Inventory</a>
</section>

<section class="section inventory-container">
  <!-- Unified search bar -->
  <input type="text" class="minimal-search" placeholder="Search models (e.g. Porsche, BMW)...">

  <!-- Unified grid layout (cards injected by script.js) -->
  <div class="results-meta"></div>
  <div class="grid-layout"></div>
</section>

<!-- Chat widget -->
<div class="chat-bubble" onclick="document.querySelector('.chat-window').classList.toggle('open')">
  💬
</div>

<div class="chat-window">
  <div class="chat-header">
    <strong>Horic Assistant</strong>
  </div>
  <div class="chat-messages">
    <div class="msg bot"><div class="msg-bubble">Welcome to Horic Autos. How can I assist you today?</div></div>
  </div>
  <div class="chat-input-container">
    <input type="text" class="minimal-search" placeholder="Ask anything...">
  </div>
</div>

<!-- Vehicle details modal -->
<div id="carModal" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button type="button" class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
