<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Horic Autos | Drive Beyond</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
<div class="nav-logo">
  <img src="horic.png" alt="Horic Autos Logo" a href="index.html"></a>
</div>    
<div class="nav-links">
        <a href="index.html">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </div>
</nav>
<main class="inventory-container">
    <header class="inventory-header">
        <div class="filter-controls">
            <div class="search-wrapper">
                <input type="text" placeholder="Search inventory..." class="minimal-search">
            </div>
            <div class="filter-group">
                <label for="make-select">Filter by Make:</label>
                <select id="make-select" class="minimal-select">
                    <option>All Makes</option>
                    <option>Porsche</option>
                    <option>BMW</option>
                    <option>Mercedes-Benz</option>
                </select>
                <label for="sort-select">Sort by:</label>
                <select id="sort-select" class="minimal-select">
                    <option>Sort: Newest</option>
                    <option>Price: Low to High</option>
                    <option>Price: High to Low</option>
                </select>
            </div>
        </div>
    </header>

    <section class="inventory-grid">
        <div class="results-meta">Showing 24 Vehicles</div>

        <div class="grid-layout">
            <article class="inventory-card">
                <div class="card-image-wrap">
                    <div class="image-placeholder">🏎️</div>
                    <span class="status-tag">In Stock</span>
                </div>
                <div class="card-content">
                    <div class="card-title">
                        <h3>2024 Porsche 911 GT3 RS</h3>
                        <p class="specs">4.0L H6 • 518hp • Shark Blue</p>
                    </div>
                    <div class="card-footer">
                        <span class="price">$223,800</span>
                        <button class="btn-text">Details →</button>
                    </div>
                </div>
            </article>

            <article class="inventory-card">
                <div class="card-image-wrap">
                    <div class="image-placeholder">🏎️</div>
                </div>
                <div class="card-content">
                    <div class="card-title">
                        <h3>2023 BMW M4 CSL</h3>
                        <p class="specs">3.0L I6 • 543hp • Frozen Grey</p>
                    </div>
                    <div class="card-footer">
                        <span class="price">$139,900</span>
                        <button class="btn-text">Details →</button>
                    </div>
                </div>
            </article>
            
            </div>
    </section>
</main>
<script src="script.js"></script>
</body>
</html>
