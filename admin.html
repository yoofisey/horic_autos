<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horic Autos | Admin Control</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,800;0,900;1,800;1,900&family=Barlow:wght@400;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="login-overlay" class="login-screen">
        <div class="login-card">
            <div class="login-heading">
                <h2>Admin <span class="g">Access</span></h2>
                <p>Enter credentials to manage inventory</p>
            </div>
            <div class="login-field">
                <label class="login-label">Passcode</label>
                <input type="password" id="admin-pass" class="login-input" placeholder="••••">
            </div>
            <div id="login-err" class="login-error">Invalid Access Code</div>
            <button onclick="handleLogin()" class="btn-login">Unlock Dashboard</button>
            <a href="index.html" class="back-link">← Return to Showroom</a>
        </div>
    </div>

    <div id="admin-panel" class="admin-layout">
        <nav>
            <div class="nav-logo">
                <h1 class="modal-title">HORIC <span class="g">ADMIN</span></h1>
            </div>
            <div class="nav-links">
                <button class="nav-cta" onclick="openModal()">+ Add Vehicle</button>
                <button class="btn-view" onclick="logout()" style="margin-left:1rem">Logout</button>
            </div>
        </nav>

        <div class="admin-body">
            <div class="section-header">
                <div>
                    <div class="sec-eye">Live Inventory</div>
                    <h2 class="sec-title">Vehicle <span class="g">Manager</span></h2>
                </div>
                <div class="sec-count" id="inv-count">0 Units</div>
            </div>

            <div style="overflow-x: auto; background: var(--white); border: 1.5px solid var(--border);">
                <table style="width: 100%; border-collapse: collapse; font-family: 'Barlow', sans-serif;">
                    <thead style="background: var(--off); border-bottom: 2px solid var(--green);">
                        <tr style="text-align: left;">
                            <th style="padding: 1.2rem; font-family: 'Rajdhani'; text-transform: uppercase; font-size: .75rem; letter-spacing: .1em;">Preview</th>
                            <th style="padding: 1.2rem; font-family: 'Rajdhani'; text-transform: uppercase; font-size: .75rem; letter-spacing: .1em;">Vehicle Details</th>
                            <th style="padding: 1.2rem; font-family: 'Rajdhani'; text-transform: uppercase; font-size: .75rem; letter-spacing: .1em;">Price (GHS)</th>
                            <th style="padding: 1.2rem; font-family: 'Rajdhani'; text-transform: uppercase; font-size: .75rem; letter-spacing: .1em;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-list">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="form-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modal-type">Add New Vehicle</div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <form id="vehicle-form" class="modal-body">
                <div class="detail-grid">
                    <div class="login-field">
                        <label class="login-label">Make & Model</label>
                        <input type="text" id="v-name" class="login-input" required placeholder="e.g. Mercedes C63S">
                    </div>
                    <div class="login-field">
                        <label class="login-label">Year</label>
                        <input type="number" id="v-year" class="login-input" required placeholder="2024">
                    </div>
                    <div class="login-field">
                        <label class="login-label">Price</label>
                        <input type="number" id="v-price" class="login-input" required placeholder="550000">
                    </div>
                    <div class="login-field">
                        <label class="login-label">Condition</label>
                        <select id="v-cond" class="login-input">
                            <option value="NEW">Brand New</option>
                            <option value="USED">Pre-Owned</option>
                        </select>
                    </div>
                </div>
                <div class="login-field">
                    <label class="login-label">Image URL</label>
                    <input type="text" id="v-img" class="login-input" placeholder="https://image-link.jpg">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Confirm Listing</button>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
